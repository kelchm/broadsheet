version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          arguments:
            - disableStutteringCheck
    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
