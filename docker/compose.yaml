services:
  paperboy:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: paperboy:latest
    container_name: paperboy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - paperboy-data:/data
    environment:
      PAPERBOY_LOG_LEVEL: info
      # PAPERBOY_CROP_OCR: "true"

volumes:
  paperboy-data:
