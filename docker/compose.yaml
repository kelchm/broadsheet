services:
  broadsheet:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: broadsheet:latest
    container_name: broadsheet
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - broadsheet-data:/data
    environment:
      BROADSHEET_LOG_LEVEL: info

volumes:
  broadsheet-data:
