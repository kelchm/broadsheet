# Cross-platform dev environment for broadsheet.
# `docker compose -f compose.dev.yaml up --build` gives you a shell with Go and
# all CGo deps pre-installed. No host installs required beyond Docker itself.
services:
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
    working_dir: /workspaces/broadsheet
    volumes:
      - .:/workspaces/broadsheet
      - broadsheet-go-modcache:/go/pkg/mod
    ports:
      - "8080:8080"
    environment:
      BROADSHEET_DATA_DIR: /workspaces/broadsheet/data
    command: ["bash", "-lc", "go run ./cmd/broadsheet-server"]

volumes:
  broadsheet-go-modcache:
