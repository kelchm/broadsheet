name: docker-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperboy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      # Build each arch into the local daemon and actually RUN it before
      # anything is pushed: distroless + natively-linked MuPDF has broken at
      # runtime before while still building fine — and that incident (fb8fecd,
      # glibc>=2.38) was arm64-only, so amd64 alone would not have caught it.
      # QEMU covers the arm64 run; the GHA cache means the multi-arch push
      # below pays almost nothing extra.
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: paperboy-smoke:amd64
          build-args: |
            VERSION=${{ steps.meta.outputs.version || 'dev' }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/arm64
          load: true
          tags: paperboy-smoke:arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version || 'dev' }}
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test images
        run: |
          # Exercises the dynamic loader + bundled MuPDF linkage on both arches.
          docker run --rm --platform linux/amd64 paperboy-smoke:amd64 --version
          docker run --rm --platform linux/arm64 paperboy-smoke:arm64 --version
          # Boot the amd64 server and poll liveness (random host port).
          cid=$(docker run -d -P paperboy-smoke:amd64)
          trap 'docker rm -f "$cid" >/dev/null' EXIT
          addr=$(docker port "$cid" 8080/tcp | head -n1)
          for i in $(seq 1 20); do
            if curl -fsS "http://${addr}/health" >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "server never became healthy"; docker logs "$cid"; exit 1
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
